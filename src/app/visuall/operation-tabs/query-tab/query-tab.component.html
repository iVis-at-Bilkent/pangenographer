<div class="panel-group">
  <div class="panel">
    <div
      class="panel-heading"
      [class.collapsed]="isBenchmarkUrl"
      data-bs-toggle="collapse"
      data-bs-target="#advanced-query-tab"
    >
      <span class="panel-title accordion-toggle"
        ><b class="va-heading2">General Queries</b></span
      >
    </div>

    <div
      id="advanced-query-tab"
      class="collapse text-center m-1"
      [class.show]="!isBenchmarkUrl"
    >
      <app-advanced-queries></app-advanced-queries>
    </div>
  </div>

  <div class="panel">
    <div
      class="panel-heading collapsed"
      data-bs-toggle="collapse"
      data-bs-target="#custom-query-tab"
    >
      <span class="panel-title accordion-toggle"
        ><b class="va-heading2">Custom Queries</b></span
      >
    </div>

    <div
      id="custom-query-tab"
      class="collapse text-center m-1"
      [class.show]="!isBenchmarkUrl"
    >
      <app-custom-queries></app-custom-queries>
    </div>
  </div>

  <div class="panel" *ngIf="isBenchmarkUrl">
    <div
      class="panel-heading"
      [class.collapsed]="!isBenchmarkUrl"
      data-bs-toggle="collapse"
      data-bs-target="#benchmark-query-tab"
    >
      <span class="panel-title accordion-toggle"
        ><b class="va-heading2">Benchmarks</b></span
      >
    </div>

    <div id="benchmark-query-tab" class="show collapse m-1">
      <app-benchmark-tab></app-benchmark-tab>
    </div>
  </div>
</div>
