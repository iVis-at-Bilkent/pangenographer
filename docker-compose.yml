services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

  prod:
    build:
      context: .
      target: prod
    ports:
      - "5200:5200"
    environment:
      - NODE_ENV=production
    restart: unless-stopped